<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        background: #fff;
        color: #000;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      .popup {
        width: 320px;
        padding: 16px;
        box-sizing: border-box;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 12px 0;
        font-weight: 700;
      }

      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
        font-size: 14px;
      }

      .item:last-child {
        border-bottom: none;
      }

      /* switch */
      .switch {
        position: relative;
        width: 42px;
        height: 24px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.2s;
        border-radius: 999px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        top: 3px;
        background-color: white;
        transition: 0.2s;
        border-radius: 50%;
      }

      .switch input:checked + .slider {
        background-color: #ff7200;
      }

      .switch input:checked + .slider:before {
        transform: translateX(18px);
      }
    </style>
  </head>

  <body>
    <div class="popup">
      <h1>로토무 번역기 설정</h1>

      <div class="item">
        <span>이름 번역</span>
        <label class="switch">
          <input type="checkbox" id="pokedex" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="item">
        <span>기술 번역</span>
        <label class="switch">
          <input type="checkbox" id="moves" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="item">
        <span>특성 번역</span>
        <label class="switch">
          <input type="checkbox" id="abilities" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="item">
        <span>도구 번역</span>
        <label class="switch">
          <input type="checkbox" id="items" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="item">
        <span>성격 번역</span>
        <label class="switch">
          <input type="checkbox" id="natures" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>

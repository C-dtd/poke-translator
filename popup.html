<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link href="popup.css" rel="stylesheet" />
  </head>

  <body>
    <div class="popup-container">
      <div class="translate-container">
        <h1>로토무 번역기 설정</h1>

        <div class="translate-item">
          <span>이름 번역</span>
          <label class="switch">
            <input type="checkbox" id="pokedex" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="translate-item">
          <span>기술 번역</span>
          <label class="switch">
            <input type="checkbox" id="moves" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="translate-item">
          <span>특성 번역</span>
          <label class="switch">
            <input type="checkbox" id="abilities" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="translate-item">
          <span>도구 번역</span>
          <label class="switch">
            <input type="checkbox" id="items" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="translate-item">
          <span>성격 번역</span>
          <label class="switch">
            <input type="checkbox" id="natures" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="button-container">
          <button id="active-all-btn">전체 활성화</button>
          <button id="deactive-all-btn">전체 비활성화</button>
        </div>
      </div>

      <div class="sitelist-container">
        <h3>번역 허용 사이트</h3>
        <div class="button-container">
          <input type="url" id="current-host" />
          <button id="add-site-btn">+ 추가</button>
        </div>
        <div id="sitelist"></div>
        <div id="sitelist-empty-msg" class="empty-msg">등록된 사이트가 없습니다.</div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
